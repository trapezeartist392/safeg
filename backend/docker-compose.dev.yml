version: "3.9"

services:

  postgres:
    image: postgres:16-alpine
    container_name: safeg_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       safeg_ai
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: SafeG@DB2024!
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: safeg_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data: