version: '3.9'

# ═══════════════════════════════════════════════════════
# SafeG AI — Full Stack Docker Compose
# ═══════════════════════════════════════════════════════
# Start everything:   docker compose up -d
# Logs:               docker compose logs -f api
# Reset DB:           docker compose down -v && docker compose up -d
# ═══════════════════════════════════════════════════════

services:

  # ── PostgreSQL
  postgres:
    image: postgres:16-alpine
    container_name: safeg_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       safeg_ai
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: SafeG@DB2024!
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d safeg_ai"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - safeg_net

  # ── Redis (cache + pub/sub)
  redis:
    image: redis:7-alpine
    container_name: safeg_redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --requirepass SafeG@Redis2024!
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "SafeG@Redis2024!", "ping"]
      interval: 10s
      retries: 3
    networks:
      - safeg_net

  # ── SafeG AI Node.js Backend API
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: safeg_api
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV:     production
      PORT:         4000
      DB_HOST:      postgres
      DB_PORT:      5432
      DB_NAME:      safeg_ai
      DB_USER:      postgres
      DB_PASSWORD:  SafeG@DB2024!
      REDIS_URL:    redis://:SafeG@Redis2024!@redis:6379
      AI_ENGINE_URL: http://ai_engine:5001
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
      - ./uploads:/app/uploads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - safeg_net
    command: >
      sh -c "node src/config/migrate.js && node src/server.js"

  # ── AI Engine stub (Python FastAPI)
  # Replace with actual AI service in production
  ai_engine:
    build:
      context: ./ai_engine_stub
      dockerfile: Dockerfile
    container_name: safeg_ai_engine
    restart: unless-stopped
    environment:
      API_KEY: ${AI_API_KEY:-internal_ai_key}
      POSTGRES_URL: postgresql://postgres:SafeG@DB2024!@postgres:5432/safeg_ai
    ports:
      - "5001:5001"
    depends_on:
      - postgres
    networks:
      - safeg_net

  # ── Nginx reverse proxy
  nginx:
    image: nginx:alpine
    container_name: safeg_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - api
    networks:
      - safeg_net

  # ── pgAdmin (dev only — comment out in production)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: safeg_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL:    admin@safeg.ai
      PGADMIN_DEFAULT_PASSWORD: SafeG@Admin2024!
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - safeg_net
    profiles:
      - dev    # Only runs with: docker compose --profile dev up

volumes:
  postgres_data:
  redis_data:

networks:
  safeg_net:
    driver: bridge
