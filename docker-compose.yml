version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# Syyaim SafeG AI — Full Stack Docker Compose
# Boots: PostgreSQL · Redis · Backend API · AI Engine Stub · Nginx
# Frontend: run separately with `npm run dev` from /frontend
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: safeg-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       safeg_ai
      POSTGRES_USER:     safeg
      POSTGRES_PASSWORD: safeg_secret_2024
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U safeg -d safeg_ai"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: safeg-redis
    restart: unless-stopped
    command: redis-server --requirepass safeg_redis_2024
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "safeg_redis_2024", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── Backend API ──────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: safeg-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV:           production
      PORT:               3000
      WS_PORT:            4000
      DATABASE_URL:       postgresql://safeg:safeg_secret_2024@postgres:5432/safeg_ai
      REDIS_URL:          redis://:safeg_redis_2024@redis:6379
      JWT_SECRET:         change_this_to_a_long_random_secret_in_production
      JWT_REFRESH_SECRET: change_this_refresh_secret_too
      CORS_ORIGIN:        http://localhost:5173,http://localhost:3001
      # Razorpay — fill in your keys
      RAZORPAY_KEY_ID:       ${RAZORPAY_KEY_ID:-rzp_test_placeholder}
      RAZORPAY_KEY_SECRET:   ${RAZORPAY_KEY_SECRET:-placeholder}
      RAZORPAY_WEBHOOK_SECRET: ${RAZORPAY_WEBHOOK_SECRET:-placeholder}
    ports:
      - "3000:3000"   # REST API
      - "4000:4000"   # WebSocket
    volumes:
      - ./backend/logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── AI Engine Stub (Python) ──────────────────────────────────
  ai-engine:
    build:
      context: ./backend/ai_engine_stub
      dockerfile: Dockerfile
    container_name: safeg-ai-engine
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      SAFEG_API_URL:    http://backend:3000
      SAFEG_API_KEY:    internal_ai_engine_key
    ports:
      - "8001:8001"

  # ── Nginx Reverse Proxy ──────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: safeg-nginx
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./backend/docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
  redis_data:
